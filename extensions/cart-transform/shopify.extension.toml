api_version = "2025-10"

[[extensions]]
type = "function"
name = "MultiBundles Cart Transform"
handle = "multibundles-cart-transform"
description = "Expands bundle parent products into their component line items at checkout. Handles Fixed, Mix & Match, and Custom bundle types."

  [extensions.build]
  command = "cargo build --release --target wasm32-wasip1"
  path = "target/wasm32-wasip1/release/cart_transform.wasm"
  watch = ["src/**/*.rs"]

  [extensions.ui]
  enable_create = false
