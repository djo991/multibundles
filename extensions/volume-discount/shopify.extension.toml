api_version = "2025-10"

[[extensions]]

uid = "978adae1-a3e0-5a19-c67c-476677d3bbb16e38533b"

type = "function"
name = "MultiBundles Volume Discount"
handle = "multibundles-volume-discount"
description = "Applies tiered volume discounts to products based on cart line quantities. Reads discount tiers from the product's volume-config metafield."

  [[extensions.targeting]]
  target = "purchase.product-discount.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = "cargo build --release --target wasm32-unknown-unknown"
  path = "target/wasm32-unknown-unknown/release/volume_discount.wasm"
  watch = ["src/**/*.rs"]

  [extensions.ui]
  enable_create = false
